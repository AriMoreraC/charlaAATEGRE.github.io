<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuraciones Básicas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../CSS/index.css" />
</head>

<body
  class="min-h-screen flex flex-col bg-gradient-to-b from-[#eef2ff] via-[#dddddd] to-[#fff4f4] fade-in overflow-x-hidden break-words"
>
<!-- BOTÓN VOLVER FIJO -->
<a href="../../index.html#temas"
   class="fixed bottom-8 right-8 z-[9999] 
          flex items-center gap-5
          bg-[var(--azul-principal)] 
          text-white 
          px-10 py-5
          rounded-full
          border-4 border-[var(--rosado-acento)]
          shadow-2xl
          text-3xl font-extrabold
          hover:bg-[var(--rosado-acento)]
          hover:border-[var(--azul-principal)]
          hover:scale-110
          transition-all duration-300 ease-in-out">

  <svg xmlns="http://www.w3.org/2000/svg"
       class="w-9 h-9"
       fill="none"
       viewBox="0 0 24 24"
       stroke-width="2.5"
       stroke="currentColor">
    <path stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 19.5L8.25 12l7.5-7.5" />
  </svg>

  Volver a Inicio
</a>

<!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 bg-white/75 backdrop-blur-md shadow-sm z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="#inicio" class="flex items-center gap-3 text-2xl lg:text-3xl font-extrabold text-gray-900">
        <svg class="w-10 h-10 text-[var(--rosado-secundario)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
          <line x1="12" y1="18" x2="12.01" y2="18"></line>
        </svg>
        Aprende a usar el Celular
      </a>
      
      <nav class="hidden md:flex items-center gap-2">
        <a href="../../index.html" class="nav-link active px-5 py-3 rounded-full font-bold text-gray-600 hover:text-[var(--azul-gris-fondo)] hover:bg-[var(--azul-secundario)] transition-all text-xl">Inicio</a>
      </nav>

      <button id="menuBtn" class="md:hidden w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600">
        <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
    
  </header>
<!-- MAIN -->
<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 py-32">
<div id="menu" class="grid gap-6 grid-cols-2 md:grid-cols-4">

    <!-- Volumen -->
   <a onclick="mostrarSeccion('volumen')">
<div class="topic-card bg-white border-2 border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[var(--rosado-acento)] hover:scale-105 flex flex-col items-center">        
        <div class="w-24 h-24 bg-[var(--rosado-acento)] rounded-3xl flex items-center justify-center text-[var(--rosado-secundario)] mb-6">
          <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 5l6 7-6 7V5z" />
          </svg>
        </div>
        <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-[var(--rosado-secundario)] mb-6 text-center">Volumen</h2>
      </div>
    </a>

    <!-- Brillo -->
<a onclick="mostrarSeccion('brillo')">
<div class="topic-card bg-white border-2 border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[var(--azul-principal)] hover:scale-105 flex flex-col items-center">        
        
        <div class="w-24 h-24 bg-[var(--azul-secundario)] rounded-3xl flex items-center justify-center text-[var(--azul-principal)] mb-6">
          <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v3m0 12v3m9-9h-3M6 12H3m15.364-6.364l-2.121 2.121M6.757 17.657l-2.121 2.121M17.657 17.657l-2.121-2.121M6.757 6.343L4.636 8.464M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
        </div>

        <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-[var(--azul-principal)] mb-6 text-center">Brillo</h2>


      </div>
    </a>

    <!-- Tamaño Letra -->
<a onclick="mostrarSeccion('letra')">
<div class="topic-card bg-white border-2 border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[var(--rosado-acento)] hover:scale-105 flex flex-col items-center">        
        
        <div class="w-24 h-24 bg-[var(--rosado-acento)] rounded-3xl flex items-center justify-center text-[var(--rosado-secundario)] mb-6">
          <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </div>

        <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-[var(--rosado-secundario)] mb-6 text-center">Letra</h2>
      

      </div>
    </a>

    <!-- Teclado -->
<a onclick="mostrarSeccion('teclado')">
<div class="topic-card bg-white border-2 border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[var(--azul-principal)] hover:scale-105 flex flex-col items-center">        
        
        <div class="w-24 h-24 bg-[var(--azul-secundario)] rounded-3xl flex items-center justify-center text-[var(--azul-principal)] mb-6">
          <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9h18M3 15h18M5 21h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
        </div>

        <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-[var(--azul-principal)] mb-6 text-center">Teclado</h2>


      </div>
    </a>

  </div>

<section id="volumen" class="hidden py-20">
<div id="seccion-volumen"></div>
  
</section>

<section id="brillo" class="hidden py-20">
<div id="seccion-brillo"></div>
</section>

<section id="letra" class="hidden py-20">
<div id="seccion-letra"></div>
</section>

<section id="teclado" class="hidden py-20">
<div id="seccion-teclado"></div>
</section>
</main>

<!-- FOOTER -->
<div id="idfooter"></div>

</body>
<script src="../../JS/layout.js"></script>
<script>
(function(){
  var s = document.createElement("script");
  s.src = "https://cdn.userway.org/widget.js";
  s.setAttribute("data-account", "demo");
  document.body.appendChild(s);
})();
</script>
</html>
